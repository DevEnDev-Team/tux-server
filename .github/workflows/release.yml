name: Build and Release Server

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-release-server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Extraction ou génération de la version
      - name: Get version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            TAG_NAME="v$VERSION"
          else
            VERSION="1.0.0-build-${GITHUB_SHA::8}"
            TAG_NAME="v1.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_ENV
          echo "tag=$TAG_NAME" >> $GITHUB_ENV
          echo "Version extraite : $VERSION (Tag : $TAG_NAME)"

      # 2. Installation de Go et compilation du serveur
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Build Go Server
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o tux-server main.go
          zip -j tux-server-linux.zip tux-server docker-compose.yml Dockerfile

      # 3. Publication de l'image Docker sur GitHub Container Registry (GHCR)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker Image Name
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository }}"
          IMAGE_NAME=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.version }}

      # 4. Création automatique du tag Git s'il n'existe pas encore (sur push main)
      - name: Push Git Tag
        if: github.ref == 'refs/heads/main'
        run: |
          if git rev-parse "${{ env.tag }}" >/dev/null 2>&1; then
            echo "Le tag ${{ env.tag }} existe déjà. Utilisation d'un tag de build automatique."
            UNIQUE_TAG="${{ env.tag }}-build-${{ github.run_number }}"
            echo "tag=$UNIQUE_TAG" >> $GITHUB_ENV
            git tag $UNIQUE_TAG
            git push origin $UNIQUE_TAG
          else
            echo "Création du tag ${{ env.tag }}"
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git tag ${{ env.tag }}
            git push origin ${{ env.tag }}
          fi

      # 5. Publication de la Release avec le serveur précompilé
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.tag }}
          name: "Tux-Server - Version ${{ env.version }} ☁️"
          body: |
            ## ☁️ Tux-Server Release - Version ${{ env.version }}
            
            Voici le serveur de synchronisation Go précompilé et prêt à être déployé pour Tux-It.
            
            ### 📦 Fichier inclus :
            * **`tux-server-linux.zip`** : Contient le serveur de synchronisation Go compilé statiquement (`tux-server`), avec son `docker-compose.yml` et `Dockerfile` pour un déploiement instantané.
            
            ---
            
            ### 🐳 Déploiement avec Docker (Recommandé) :
            1. Téléchargez et extrayez le fichier `tux-server-linux.zip`.
            2. Ouvrez le fichier `docker-compose.yml` et configurez votre mot de passe d'administration (`ADMIN_PASSWORD`).
            3. Lancez le conteneur :
               ```bash
               docker compose up --build -d
               ```
            *Le serveur écoutera sur le port `8282` et persistera ses données dans le dossier `./data/`.*
          draft: false
          prerelease: false
          files: |
            tux-server-linux.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
